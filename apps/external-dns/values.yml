provider:
  name: aws

env:
- name: AWS_ACCESS_KEY_ID
  valueFrom:
    secretKeyRef:
      name: externaldns-route53-credentials
      key: account-access-key
- name: AWS_DEFAULT_REGION
  value: "us-east-1"
- name: AWS_SECRET_ACCESS_KEY
  valueFrom:
    secretKeyRef:
      name: externaldns-route53-credentials
      key: secret-access-key

txtOwnerId: "homelab-cluster" # unique ID to track DNS records
domainFilters:
- "alialjaffer.com" # restrict to my domain

policy: upsert-only
  # sync = delete stale records too
  # upsert-only = never delete
sources:
- service
- ingress
